openapi: 3.0.3
info:
  title: OpenTrader API
  description: |
    Enterprise-grade AI Trading Framework API
    
    ## Overview
    OpenTrader provides a comprehensive REST API for algorithmic trading with support for:
    - Multiple exchanges (Binance, Bybit, Coinbase, etc.)
    - Real-time WebSocket streaming
    - Advanced order types
    - Portfolio management
    - Risk management
    - AI-powered trading signals
    - Backtesting
    
    ## Authentication
    All endpoints require JWT Bearer token authentication.
    Include the token in the Authorization header:
    ```
    Authorization: Bearer <your_token>
    ```
    
    ## Rate Limits
    - Default: 100 requests/minute
    - Trading endpoints: 60 requests/minute
    - Historical data: 30 requests/minute
    
    ## Response Format
    All responses follow a standard format:
    ```json
    {
      "success": true,
      "data": {},
      "error": null,
      "timestamp": "2024-01-01T00:00:00Z"
    }
    ```
  version: 1.0.0
  contact:
    name: OpenTrader Support
    email: support@opentreder.example.com
    url: https://github.com/Nirmal09809/opentreder
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html

servers:
  - url: https://api.opentreder.example.com
    description: Production server
  - url: https://staging-api.opentreder.example.com
    description: Staging server
  - url: http://localhost:8080
    description: Local development

tags:
  - name: Health
    description: Health check endpoints
  - name: Authentication
    description: Authentication and authorization
  - name: Trading
    description: Order placement and management
  - name: Portfolio
    description: Portfolio and account management
  - name: Market Data
    description: Market data and price feeds
  - name: Strategies
    description: Trading strategy management
  - name: Risk
    description: Risk management
  - name: AI
    description: AI trading signals and analysis
  - name: Backtest
    description: Backtesting operations
  - name: WebSocket
    description: WebSocket subscriptions

paths:
  /health:
    get:
      tags:
        - Health
      summary: Health check
      description: Returns the health status of the API
      operationId: getHealth
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /ready:
    get:
      tags:
        - Health
      summary: Readiness check
      description: Returns whether the service is ready to accept traffic
      operationId: getReadiness
      responses:
        '200':
          description: Service is ready
        '503':
          description: Service is not ready

  /api/v1/auth/login:
    post:
      tags:
        - Authentication
      summary: Login
      description: Authenticate user and receive JWT token
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: Invalid credentials

  /api/v1/auth/refresh:
    post:
      tags:
        - Authentication
      summary: Refresh token
      description: Refresh JWT access token
      operationId: refreshToken
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Token refreshed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'

  /api/v1/orders:
    get:
      tags:
        - Trading
      summary: List orders
      description: Get all orders with optional filtering
      operationId: listOrders
      security:
        - bearerAuth: []
      parameters:
        - name: symbol
          in: query
          description: Filter by symbol
          schema:
            type: string
            example: BTC/USDT
        - name: status
          in: query
          description: Filter by status
          schema:
            $ref: '#/components/schemas/OrderStatus'
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
            maximum: 1000
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: List of orders
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderListResponse'
    
    post:
      tags:
        - Trading
      summary: Place order
      description: Place a new order
      operationId: placeOrder
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlaceOrderRequest'
      responses:
        '201':
          description: Order placed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'
        '400':
          description: Invalid order parameters
        '403':
          description: Insufficient balance

  /api/v1/orders/{orderId}:
    get:
      tags:
        - Trading
      summary: Get order
      description: Get details of a specific order
      operationId: getOrder
      security:
        - bearerAuth: []
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Order details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'
        '404':
          description: Order not found

    delete:
      tags:
        - Trading
      summary: Cancel order
      description: Cancel a pending order
      operationId: cancelOrder
      security:
        - bearerAuth: []
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Order cancelled
        '404':
          description: Order not found

  /api/v1/portfolio:
    get:
      tags:
        - Portfolio
      summary: Get portfolio
      description: Get current portfolio holdings and balances
      operationId: getPortfolio
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Portfolio details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PortfolioResponse'

  /api/v1/positions:
    get:
      tags:
        - Portfolio
      summary: Get positions
      description: Get all open positions
      operationId: getPositions
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of positions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PositionListResponse'

  /api/v1/market/ticker/{symbol}:
    get:
      tags:
        - Market Data
      summary: Get ticker
      description: Get current ticker price for a symbol
      operationId: getTicker
      parameters:
        - name: symbol
          in: path
          required: true
          schema:
            type: string
            example: BTC/USDT
      responses:
        '200':
          description: Ticker data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TickerResponse'

  /api/v1/market/candles/{symbol}:
    get:
      tags:
        - Market Data
      summary: Get candles
      description: Get OHLCV candle data
      operationId: getCandles
      parameters:
        - name: symbol
          in: path
          required: true
          schema:
            type: string
        - name: timeframe
          in: query
          schema:
            type: string
            enum: [1m, 5m, 15m, 1h, 4h, 1d, 1w]
            default: 1h
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
            maximum: 1000
        - name: startTime
          in: query
          schema:
            type: integer
            description: Start time in milliseconds
        - name: endTime
          in: query
          schema:
            type: integer
            description: End time in milliseconds
      responses:
        '200':
          description: Candle data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CandleListResponse'

  /api/v1/strategies:
    get:
      tags:
        - Strategies
      summary: List strategies
      description: Get all trading strategies
      operationId: listStrategies
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of strategies
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StrategyListResponse'
    
    post:
      tags:
        - Strategies
      summary: Create strategy
      description: Create a new trading strategy
      operationId: createStrategy
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateStrategyRequest'
      responses:
        '201':
          description: Strategy created

  /api/v1/strategies/{strategyId}/start:
    post:
      tags:
        - Strategies
      summary: Start strategy
      description: Start a trading strategy
      operationId: startStrategy
      security:
        - bearerAuth: []
      parameters:
        - name: strategyId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Strategy started

  /api/v1/strategies/{strategyId}/stop:
    post:
      tags:
        - Strategies
      summary: Stop strategy
      description: Stop a running trading strategy
      operationId: stopStrategy
      security:
        - bearerAuth: []
      parameters:
        - name: strategyId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Strategy stopped

  /api/v1/risk/limits:
    get:
      tags:
        - Risk
      summary: Get risk limits
      description: Get current risk management limits
      operationId: getRiskLimits
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Risk limits
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RiskLimitsResponse'
    
    put:
      tags:
        - Risk
      summary: Update risk limits
      description: Update risk management limits
      operationId: updateRiskLimits
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateRiskLimitsRequest'
      responses:
        '200':
          description: Risk limits updated

  /api/v1/ai/signal:
    post:
      tags:
        - AI
      summary: Get AI signal
      description: Get AI-generated trading signal
      operationId: getAISignal
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AISignalRequest'
      responses:
        '200':
          description: AI signal
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AISignalResponse'

  /api/v1/backtest:
    post:
      tags:
        - Backtest
      summary: Run backtest
      description: Run a strategy backtest
      operationId: runBacktest
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BacktestRequest'
      responses:
        '202':
          description: Backtest started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BacktestJobResponse'

  /api/v1/backtest/{jobId}:
    get:
      tags:
        - Backtest
      summary: Get backtest results
      description: Get backtest job status and results
      operationId: getBacktest
      security:
        - bearerAuth: []
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Backtest results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BacktestResultResponse'

  /ws:
    get:
      tags:
        - WebSocket
      summary: WebSocket connection
      description: Connect to WebSocket for real-time updates
      operationId: websocketConnect
      parameters:
        - name: token
          in: query
          description: Authentication token
          schema:
            type: string
      responses:
        '101':
          description: Switching Protocols

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          enum: [healthy, unhealthy]
        version:
          type: string
        uptime:
          type: integer
        timestamp:
          type: string
          format: date-time

    LoginRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
        password:
          type: string
          format: password

    LoginResponse:
      type: object
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        expiresIn:
          type: integer
        tokenType:
          type: string
          default: Bearer

    OrderStatus:
      type: string
      enum:
        - pending
        - open
        - filled
        - partially_filled
        - cancelled
        - rejected

    OrderSide:
      type: string
      enum:
        - buy
        - sell

    OrderType:
      type: string
      enum:
        - market
        - limit
        - stop
        - stop_limit
        - take_profit
        - trailing_stop

    PlaceOrderRequest:
      type: object
      required:
        - symbol
        - side
        - type
        - quantity
      properties:
        symbol:
          type: string
          example: BTC/USDT
        side:
          $ref: '#/components/schemas/OrderSide'
        type:
          $ref: '#/components/schemas/OrderType'
        quantity:
          type: string
          description: Order quantity as string for precision
          example: "0.001"
        price:
          type: string
          description: Limit price (required for limit orders)
          example: "50000.00"
        stopPrice:
          type: string
          description: Stop price (required for stop orders)
        clientOrderId:
          type: string
          description: Client-provided order ID
        timeInForce:
          type: string
          enum: [GTC, IOC, FOK, GTX]
          default: GTC

    Order:
      type: object
      properties:
        id:
          type: string
        clientOrderId:
          type: string
        symbol:
          type: string
        side:
          $ref: '#/components/schemas/OrderSide'
        type:
          $ref: '#/components/schemas/OrderType'
        status:
          $ref: '#/components/schemas/OrderStatus'
        quantity:
          type: string
        filledQuantity:
          type: string
        price:
          type: string
        avgFillPrice:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    OrderResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          $ref: '#/components/schemas/Order'

    OrderListResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            orders:
              type: array
              items:
                $ref: '#/components/schemas/Order'
            total:
              type: integer
            limit:
              type: integer
            offset:
              type: integer

    PortfolioResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            totalValue:
              type: string
            cashBalance:
              type: string
            equityValue:
              type: string
            unrealizedPnL:
              type: string
            realizedPnL:
              type: string
            dayPnL:
              type: string
            dayReturn:
              type: string
            buyingPower:
              type: string

    Position:
      type: object
      properties:
        symbol:
          type: string
        quantity:
          type: string
        entryPrice:
          type: string
        currentPrice:
          type: string
        unrealizedPnL:
          type: string
        roi:
          type: string

    PositionListResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            positions:
              type: array
              items:
                $ref: '#/components/schemas/Position'

    TickerResponse:
      type: object
      properties:
        symbol:
          type: string
        lastPrice:
          type: string
        bidPrice:
          type: string
        askPrice:
          type: string
        volume24h:
          type: string
        high24h:
          type: string
        low24h:
          type: string
        timestamp:
          type: string
          format: date-time

    Candle:
      type: object
      properties:
        openTime:
          type: integer
          description: Timestamp in milliseconds
        open:
          type: string
        high:
          type: string
        low:
          type: string
        close:
          type: string
        volume:
          type: string
        closeTime:
          type: integer

    CandleListResponse:
      type: object
      properties:
        symbol:
          type: string
        timeframe:
          type: string
        candles:
          type: array
          items:
            $ref: '#/components/schemas/Candle'

    Strategy:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        type:
          type: string
        status:
          type: string
          enum: [active, paused, stopped, error]
        parameters:
          type: object
        performance:
          type: object
          properties:
            totalTrades:
              type: integer
            winRate:
              type: number
            profitFactor:
              type: number
            sharpeRatio:
              type: number

    StrategyListResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: array
          items:
            $ref: '#/components/schemas/Strategy'

    CreateStrategyRequest:
      type: object
      required:
        - name
        - type
        - parameters
      properties:
        name:
          type: string
        type:
          type: string
          enum: [grid, dca, trend, arbitrage, scalping, market_making]
        parameters:
          type: object
          properties:
            symbol:
              type: string
            timeframe:
              type: string
            maxPosition:
              type: number
            stopLoss:
              type: number
            takeProfit:
              type: number

    RiskLimits:
      type: object
      properties:
        maxPositionSize:
          type: number
          description: Maximum position size as fraction of portfolio (0-1)
        maxDailyLoss:
          type: number
          description: Maximum daily loss as fraction of portfolio (0-1)
        maxLeverage:
          type: number
          description: Maximum allowed leverage
        maxDrawdown:
          type: number
          description: Maximum drawdown as fraction of portfolio (0-1)

    RiskLimitsResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          $ref: '#/components/schemas/RiskLimits'

    UpdateRiskLimitsRequest:
      type: object
      properties:
        maxPositionSize:
          type: number
        maxDailyLoss:
          type: number
        maxLeverage:
          type: number
        maxDrawdown:
          type: number

    AISignalRequest:
      type: object
      required:
        - symbol
      properties:
        symbol:
          type: string
        timeframe:
          type: string
          default: 1h
        indicators:
          type: array
          items:
            type: string
          description: Additional indicators to consider

    AISignal:
      type: object
      properties:
        action:
          type: string
          enum: [buy, sell, hold]
        confidence:
          type: number
          minimum: 0
          maximum: 1
        reason:
          type: string
        entryPrice:
          type: string
        stopLoss:
          type: string
        takeProfit:
          type: string
        timeframe:
          type: string

    AISignalResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          $ref: '#/components/schemas/AISignal'

    BacktestRequest:
      type: object
      required:
        - strategyId
        - symbol
        - startDate
        - endDate
      properties:
        strategyId:
          type: string
        symbol:
          type: string
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        initialBalance:
          type: string
          default: "100000"
        parameters:
          type: object

    BacktestJobResponse:
      type: object
      properties:
        jobId:
          type: string
        status:
          type: string
          enum: [pending, running, completed, failed]

    BacktestResult:
      type: object
      properties:
        totalTrades:
          type: integer
        winningTrades:
          type: integer
        losingTrades:
          type: integer
        winRate:
          type: number
        totalPnL:
          type: string
        maxDrawdown:
          type: string
        sharpeRatio:
          type: number
        sortinoRatio:
          type: number
        trades:
          type: array
          items:
            type: object

    BacktestResultResponse:
      type: object
      properties:
        jobId:
          type: string
        status:
          type: string
        result:
          $ref: '#/components/schemas/BacktestResult'
