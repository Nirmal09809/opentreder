apiVersion: v1
kind: ConfigMap
metadata:
  name: opentreder-config
  namespace: opentreder
  labels:
    app: opentreder
    chart: opentreder
    heritage: Helm
data:
  config.yaml: |
    app:
      name: opentreder
      version: 1.0.0
      environment: production
      debug: false
      data_dir: /data
      config_dir: /config
      log_dir: /logs
    
    database:
      mode: postgresql
      postgresql:
        enabled: true
        host: postgres-service
        port: 5432
        database: opentreder
        schema: public
        ssl_mode: disable
      max_open_conns: 25
      max_idle_conns: 5
      conn_max_life: 1h
    
    cache:
      enabled: true
      ttl: 5m
    
    trading:
      mode: paper
      initial_balance: 100000
      max_positions: 10
      default_timeframe: 1h
    
    risk:
      max_position_size: 0.1
      max_daily_loss: 0.05
      max_leverage: 3
    
    api:
      rest:
        enabled: true
        host: 0.0.0.0
        port: 8080
        rate_limit: 100
      websocket:
        enabled: true
        host: 0.0.0.0
        port: 8081
      grpc:
        enabled: true
        host: 0.0.0.0
        port: 9090
    
    ui:
      enabled: true
      host: 0.0.0.0
      port: 8082
    
    logging:
      level: info
      format: json
      output: /logs/opentreder.log
      enable_file_log: true
      max_size: 100
      max_backups: 5
      max_age: 30
      compress: true
