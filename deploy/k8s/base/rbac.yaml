apiVersion: v1
kind: ServiceAccount
metadata:
  name: opentreder
  namespace: opentreder
  labels:
    app: opentreder

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: opentreder
  namespace: opentreder
  labels:
    app: opentreder
rules:
  - apiGroups: [""]
    resources: ["configmaps", "secrets", "services", "endpoints"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["get", "list", "watch", "update", "patch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: opentreder
  namespace: opentreder
  labels:
    app: opentreder
subjects:
  - kind: ServiceAccount
    name: opentreder
    namespace: opentreder
roleRef:
  kind: Role
  name: opentreder
  apiGroup: rbac.authorization.k8s.io
