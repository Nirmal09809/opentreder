apiVersion: apps/v1
kind: Deployment
metadata:
  name: opentreder
  namespace: opentreder
  labels:
    app: opentreder
    version: v1.0.0
    component: trading-engine
spec:
  replicas: 2
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app: opentreder
      version: v1.0.0
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: opentreder
        version: v1.0.0
        component: trading-engine
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: opentreder
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      terminationGracePeriodSeconds: 60
      
      containers:
        - name: opentreder
          image: ghcr.io/nirmal09809/opentreder:latest
          imagePullPolicy: Always
          
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          
          ports:
            - name: rest
              containerPort: 8080
              protocol: TCP
            - name: websocket
              containerPort: 8081
              protocol: TCP
            - name: grpc
              containerPort: 9090
              protocol: TCP
            - name: ui
              containerPort: 8082
              protocol: TCP
          
          env:
            - name: OPENTRADER_ENV
              value: "production"
            - name: OPENTRADER_CONFIG_PATH
              value: "/config/config.yaml"
            - name: GIN_MODE
              value: "release"
          
          envFrom:
            - secretRef:
                name: opentreder-secrets
          
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 2000m
              memory: 2Gi
          
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
            - name: data
              mountPath: /data
            - name: logs
              mountPath: /logs
              writeMode: Append
            - name: tmp
              mountPath: /tmp
          
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 10"]
      
      volumes:
        - name: config
          configMap:
            name: opentreder-config
        - name: data
          persistentVolumeClaim:
            claimName: opentreder-data
        - name: logs
          emptyDir: {}
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 100Mi
      
      nodeSelector:
        workload: trading
      
      tolerations:
        - key: "node.kubernetes.io/not-ready"
          operator: "Exists"
          effect: "NoSchedule"
          tolerationSeconds: 60
        - key: "node.kubernetes.io/unreachable"
          operator: "Exists"
          effect: "NoExecute"
          tolerationSeconds: 60
      
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: opentreder
                topologyKey: kubernetes.io/hostname
        podSpread:
          maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: opentreder-hpa
  namespace: opentreder
  labels:
    app: opentreder
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: opentreder
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 10
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 15
        - type: Pods
          value: 4
          periodSeconds: 15
      selectPolicy: Max

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: opentreder-pdb
  namespace: opentreder
  labels:
    app: opentreder
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: opentreder
