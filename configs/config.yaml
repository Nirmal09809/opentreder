app:
  name: OpenTrader
  version: 1.0.0
  environment: development
  debug: false
  data_dir: ./data
  config_dir: ./configs
  log_dir: ./logs
  auto_reload: false

database:
  mode: sqlite
  sqlite:
    enabled: true
    path: ./data/opentreder.db
    journal_mode: WAL
    wal_mode: true
    cache_size: 10000
  postgresql:
    enabled: false
    host: localhost
    port: 5432
    user: postgres
    password: ""
    database: opentreder
    schema: public
    ssl_mode: disable
    max_open_conns: 25
    max_idle_conns: 5
    conn_max_life: 1h

cache:
  enabled: true
  ttl: 5m
  max_size: 1000
  redis:
    enabled: false
    host: localhost
    port: 6379
    password: ""
    database: 0
    pool_size: 10
    min_idle_conns: 5
    max_retries: 3
    dial_timeout: 5s
    read_timeout: 3s
    write_timeout: 3s

trading:
  enabled: true
  mode: paper
  max_open_orders: 100
  order_timeout: 30s
  retry_attempts: 3
  retry_delay: 1s
  slippage_tolerance: 0.001
  commission_rate: 0.001
  default_leverage: 1
  allow_margin: false
  auto_liquidate: true
  partial_fill_enabled: true
  iceberg_enabled: true

risk:
  enabled: true
  max_position_size: 1.0
  max_order_size: 0.5
  max_daily_loss: 0.1
  max_drawdown: 0.2
  max_exposure: 0.8
  max_leverage: 3
  min_account_balance: 100
  position_sizing: fixed
  stop_loss: 0.05
  take_profit: 0.1
  trailing_stop: 0.02
  risk_per_trade: 0.02

ai:
  enabled: false
  provider: openai
  model: gpt-4
  api_key: ""
  api_endpoint: ""
  max_tokens: 2048
  temperature: 0.7
  top_p: 0.9
  cache_enabled: true
  cache_ttl: 24h
  timeout: 60s
  retry_attempts: 3
  ml:
    enabled: true
    model_path: ./models
    train_interval: 24h
    lookback_period: 100
    prediction_horizon: 24
    features:
      - price
      - volume
      - rsi
      - macd
    models:
      - xgboost
      - lstm
  sentiment:
    enabled: true
    sources:
      - twitter
      - reddit
      - news
    update_interval: 1h
    weight: 0.3

ui:
  theme: dark
  color_scheme: default
  refresh_rate: 1000
  show_advanced: false
  dashboard:
    show_portfolio: true
    show_positions: true
    show_orders: true
    show_trades: true
    show_charts: true
    show_signals: true
    show_risk: true
    show_pnl: true
  table:
    page_size: 25
    sortable: true
    filterable: true
    exportable: true
    col_resize: true
  chart:
    type: candlestick
    timeframes:
      - 1m
      - 5m
      - 15m
      - 1h
      - 4h
      - 1d
    indicators:
      - sma
      - ema
      - rsi
      - macd
    show_volume: true
    show_grid: true

api:
  enabled: true
  host: 0.0.0.0
  port: 8080
  tls_enabled: false
  tls_cert: ""
  tls_key: ""
  cors_enabled: true
  cors_origins:
    - "*"
  rate_limit:
    enabled: true
    requests_per_sec: 100
    burst: 200
  auth:
    enabled: false
    type: jwt
    jwt_expiration: 24h
    jwt_secret: ""

websocket:
  enabled: true
  host: 0.0.0.0
  port: 8081
  tls_enabled: false
  tls_cert: ""
  tls_key: ""
  read_buffer: 1024
  write_buffer: 1024
  ping_interval: 30s
  pong_timeout: 60s

exchanges:
  enabled:
    - binance
    - bybit
  binance:
    enabled: true
    api_key: ""
    api_secret: ""
    testnet: false
    base_url: https://api.binance.com
    ws_url: wss://stream.binance.com:9443/ws
    recv_window: 5000
    max_retries: 3
    rate_limit_per_sec: 1200
  bybit:
    enabled: true
    api_key: ""
    api_secret: ""
    testnet: false
    base_url: https://api.bybit.com
    ws_url: wss://stream.bybit.com
    category: linear
  coinbase:
    enabled: false
    api_key: ""
    api_secret: ""
    sandbox: false
    base_url: https://api.coinbase.com
  kraken:
    enabled: false
    api_key: ""
    api_secret: ""
  okx:
    enabled: false
    api_key: ""
    api_secret: ""
    passphrase: ""
    simnet: false
  alpaca:
    enabled: false
    api_key: ""
    api_secret: ""
    paper_trading: true
    base_url: https://api.alpaca.markets
  oanda:
    enabled: false
    api_key: ""
    account_id: ""
    environment: practice

strategies:
  enabled:
    - grid
    - dca
    - trend
  directory: ./configs/strategies
  params: {}

notifications:
  enabled: true
  telegram:
    enabled: false
    bot_token: ""
    chat_ids: []
    parse_mode: Markdown
    disable_notification: false
  slack:
    enabled: false
    webhook_url: ""
    channel: ""
    username: OpenTrader
    icon_emoji: ":chart_with_upwards_trend:"
  email:
    enabled: false
    smtp_host: smtp.gmail.com
    smtp_port: 587
    username: ""
    password: ""
    from: ""
    to: []
    use_tls: true
  discord:
    enabled: false
    webhook_url: ""
    username: OpenTrader
    avatar_url: ""
  webhook:
    enabled: false
    urls:
      trades: ""
      signals: ""
      errors: ""

security:
  encryption:
    enabled: false
    key: ""
    algorithm: aes256
  vault:
    enabled: false
    address: ""
    token: ""
    path_prefix: secret/opentreder
  allowed_hosts:
    - localhost
    - 127.0.0.1
  allowed_origins:
    - http://localhost:3000
    - http://localhost:8080

logging:
  level: info
  format: json
  output: ./logs/opentreder.log
  report_caller: true
  timestamp_format: "2006-01-02T15:04:05Z07:00"
  max_size: 100
  max_backups: 30
  max_age: 90
  compress: true
  enable_file_log: true
  enable_console_log: true

metrics:
  enabled: false
  host: 0.0.0.0
  port: 9090
  path: /metrics
  export_interval: 15s
